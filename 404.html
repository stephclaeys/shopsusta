<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>html,body{background:#faf9f7;margin:0;height:100%;}</style>
<script>
  // GitHub Pages clean URL redirect
  // Preserves the path and redirects to index.html
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;
  // Store the intended path in sessionStorage, then redirect to root
  sessionStorage.setItem('susta_redirect', path + search + hash);
  window.location.replace('/');
</script>
</head>
<body></body>
</html>
